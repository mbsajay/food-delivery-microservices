name: foodly-infra

services:
  # ---------- Postgres (one instance, multiple logical DBs) ----------
  postgres:
    image: postgres:16-alpine
    container_name: foodly-postgres
    environment:
      POSTGRES_USER: foodly
      POSTGRES_PASSWORD: foodly
      POSTGRES_MULTIPLE_DATABASES: users,restaurants,orders,payments,delivery
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodly"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Redis (used for rate limiting / caching) ----------
  redis:
    image: redis:7-alpine
    container_name: foodly-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Kafka (KRaft mode, no Zookeeper) ----------
  kafka:
    image: bitnami/kafka:3.7
    container_name: foodly-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka

  # ---------- Kafka UI for inspecting topics ----------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: foodly-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "foodly-local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      DYNAMIC_CONFIG_ENABLED: "true"

  # ---------- Spring Cloud infrastructure ----------
  discovery-server:
    build: ./discovery-server
    image: foodly/discovery-server
    container_name: foodly-discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  config-server:
    build: ./config-server
    image: foodly/config-server
    container_name: foodly-config
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
    ports:
      - "8888:8888"
    depends_on:
      discovery-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  api-gateway:
    build: ./api-gateway
    image: foodly/api-gateway
    container_name: foodly-gateway
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy

  # ---------- Domain services ----------
  user-service:
    build: ./user-service
    image: foodly/user-service
    container_name: foodly-user
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
      POSTGRES_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8001:8001"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  restaurant-service:
    build: ./restaurant-service
    image: foodly/restaurant-service
    container_name: foodly-restaurant
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
      POSTGRES_HOST: postgres
    ports:
      - "8002:8002"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  order-service:
    build: ./order-service
    image: foodly/order-service
    container_name: foodly-order
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
      POSTGRES_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8003:8003"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  payment-service:
    build: ./payment-service
    image: foodly/payment-service
    container_name: foodly-payment
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
      POSTGRES_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8004:8004"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  delivery-service:
    build: ./delivery-service
    image: foodly/delivery-service
    container_name: foodly-delivery
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
      POSTGRES_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8005:8005"
    depends_on:
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  notification-service:
    build: ./notification-service
    image: foodly/notification-service
    container_name: foodly-notification
    environment:
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8006:8006"
    depends_on:
      config-server:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  postgres-data:
  kafka-data:
