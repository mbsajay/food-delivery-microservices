server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: user-service-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: restaurant-service
          uri: lb://restaurant-service
          predicates:
            - Path=/api/restaurants/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/api/delivery/**
          filters:
            - StripPrefix=1
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1

        # --- Swagger UI (managed by user-service's springdoc WebMVC) ---
        - id: swagger-ui
          uri: lb://user-service
          predicates:
            - Path=/swagger-ui/**

        # --- OpenAPI doc proxies (no StripPrefix — services expose /v3/api-docs at root) ---
        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/v3/api-docs/user-service
          filters:
            - SetPath=/v3/api-docs
        - id: restaurant-service-docs
          uri: lb://restaurant-service
          predicates:
            - Path=/v3/api-docs/restaurant-service
          filters:
            - SetPath=/v3/api-docs
        - id: order-service-docs
          uri: lb://order-service
          predicates:
            - Path=/v3/api-docs/order-service
          filters:
            - SetPath=/v3/api-docs
        - id: payment-service-docs
          uri: lb://payment-service
          predicates:
            - Path=/v3/api-docs/payment-service
          filters:
            - SetPath=/v3/api-docs
        - id: delivery-service-docs
          uri: lb://delivery-service
          predicates:
            - Path=/v3/api-docs/delivery-service
          filters:
            - SetPath=/v3/api-docs
        - id: notification-service-docs
          uri: lb://notification-service
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - SetPath=/v3/api-docs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: user-service
        url: /v3/api-docs/user-service
      - name: restaurant-service
        url: /v3/api-docs/restaurant-service
      - name: order-service
        url: /v3/api-docs/order-service
      - name: payment-service
        url: /v3/api-docs/payment-service
      - name: delivery-service
        url: /v3/api-docs/delivery-service
      - name: notification-service
        url: /v3/api-docs/notification-service
