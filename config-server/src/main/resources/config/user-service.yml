server:
  port: 8001

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/users
    username: ${POSTGRES_USER:foodly}
    password: ${POSTGRES_PASSWORD:foodly}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# RS256 keypair for issuing/validating JWTs. Stored here so every service reads the
# same public key from config-server; the private key stays on user-service only.
# Values are base64-encoded DER (PKCS#8 for the private key, X.509 for the public key)
# and are dev defaults — override via env in any real deployment.
foodly:
  security:
    jwt:
      issuer: foodly-user-service
      access-token-ttl: PT15M
      refresh-token-ttl: P7D
      private-key: ${JWT_PRIVATE_KEY:}
      public-key: ${JWT_PUBLIC_KEY:}
